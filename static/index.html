<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flight Booking Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; height: 100vh; display: flex; flex-direction: column; }

  header {
    background: linear-gradient(135deg, #1e3a5f, #2980b9);
    color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  }
  header .logo { width: 36px; height: 36px; }
  header h1 { font-size: 1.2rem; font-weight: 600; }

  #chat-container {
    flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px;
  }

  .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.95rem; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #2980b9; color: #fff; border-bottom-right-radius: 4px; }
  .msg.ai   { align-self: flex-start; background: #fff; color: #1e3a5f; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .msg.ai .label, .msg.user .label { font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; }

  .typing { align-self: flex-start; background: #fff; padding: 12px 20px; border-radius: 16px; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.1); display: flex; gap: 5px; }
  .typing span { width: 8px; height: 8px; background: #2980b9; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

  #input-bar {
    padding: 16px 24px; background: #fff; border-top: 1px solid #e0e6ed; display: flex; gap: 12px;
  }
  #input-bar input {
    flex: 1; padding: 12px 16px; border: 1px solid #d0d7de; border-radius: 24px; font-size: 0.95rem; outline: none; transition: border-color .2s;
  }
  #input-bar input:focus { border-color: #2980b9; }
  #input-bar button {
    background: #2980b9; color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s;
  }
  #input-bar button:hover { background: #1e6fa0; }
  #input-bar button:disabled { background: #a0c4e0; cursor: not-allowed; }
  #input-bar button svg { width: 20px; height: 20px; fill: #fff; }

  .welcome { text-align: center; color: #6b7c93; margin: auto; }
  .welcome h2 { font-size: 1.3rem; margin-bottom: 8px; color: #1e3a5f; }
  .welcome p { font-size: 0.9rem; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
  .suggestions button {
    background: #e8f0fe; color: #1e3a5f; border: 1px solid #c5d5ea; border-radius: 20px; padding: 8px 16px; font-size: 0.85rem; cursor: pointer; transition: background .2s;
  }
  .suggestions button:hover { background: #d0e2f7; }

  .payment-methods { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
  .payment-methods span { font-size: 0.8rem; color: #6b7c93; align-self: center; }

  .payment-card {
    align-self: flex-start; background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.12); max-width: 400px; width: 100%;
  }
  .payment-card h3 { font-size: 0.95rem; color: #1e3a5f; margin-bottom: 14px; }
  .card-options { display: flex; gap: 10px; margin-bottom: 16px; }
  .card-option {
    border: 2px solid #d0d7de; border-radius: 10px; padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .2s; background: #fff;
  }
  .card-option:hover { border-color: #2980b9; background: #f0f7ff; }
  .card-option.selected { border-color: #2980b9; background: #e8f0fe; }
  .card-option svg { width: 40px; height: 26px; }
  .card-option span { font-size: 0.8rem; font-weight: 600; color: #1e3a5f; }

  .payment-field { margin-bottom: 12px; }
  .payment-field label { display: block; font-size: 0.78rem; color: #6b7c93; margin-bottom: 4px; font-weight: 600; }
  .payment-field input {
    width: 100%; padding: 10px 12px; border: 1px solid #d0d7de; border-radius: 8px; font-size: 0.9rem; outline: none; font-family: 'Courier New', monospace; letter-spacing: 1.5px;
  }
  .payment-field input:focus { border-color: #2980b9; }
  .payment-field input::placeholder { letter-spacing: 1px; color: #b0b8c4; font-family: 'Courier New', monospace; }
  .payment-row { display: flex; gap: 12px; }
  .payment-row .payment-field { flex: 1; }

  .pay-btn {
    width: 100%; padding: 10px; background: #2980b9; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background .2s; margin-top: 4px;
  }
  .pay-btn:hover { background: #1e6fa0; }
  .pay-btn:disabled { background: #a0c4e0; cursor: not-allowed; }

  .secure-note { font-size: 0.7rem; color: #6b7c93; text-align: center; margin-top: 8px; }
  .secure-note svg { width: 12px; height: 12px; vertical-align: middle; fill: #6b7c93; }
</style>
</head>
<body>

<header>
  <img class="logo" src="/static/img.png" alt="Delta Logo" />
  <h1>Delta Flight Booking Agent</h1>
</header>

<div id="chat-container">
  <div class="welcome">
    <h2>✈️ Where would you like to fly?</h2>
    <p>I can search flights, compare prices, and book tickets for you.</p>
    <div class="suggestions">
      <button onclick="useSuggestion(this)">Find flights from JFK to LAX on 2026-05-10</button>
      <button onclick="useSuggestion(this)">Round trip SFO to ORD, June 1-8 2026</button>
      <button onclick="useSuggestion(this)">Cheapest flight from BOS to MIA tomorrow</button>
      <button onclick="useSuggestion(this)">Flights from ATL to DFW next Monday</button>
      <button onclick="useSuggestion(this)">One way from ATL to SEA on 2026-07-15</button>
    </div>
    <div class="payment-methods">
      <span>We accept:</span>
      <svg width="50" height="32" viewBox="0 0 50 32"><rect width="50" height="32" rx="4" fill="#1A1F71"/><text x="25" y="20" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="12" font-weight="bold" font-style="italic">VISA</text></svg>
      <svg width="50" height="32" viewBox="0 0 50 32"><rect width="50" height="32" rx="4" fill="#252525"/><circle cx="20" cy="16" r="10" fill="#EB001B"/><circle cx="30" cy="16" r="10" fill="#F79E1B"/><circle cx="25" cy="16" r="6.5" fill="#FF5F00"/></svg>
      <svg width="50" height="32" viewBox="0 0 50 32"><rect width="50" height="32" rx="4" fill="#2E77BC"/><text x="25" y="20" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="8" font-weight="bold">AMEX</text></svg>
    </div>
  </div>
</div>

<div id="input-bar">
  <input id="user-input" type="text" placeholder="Ask me about flights…" autocomplete="off" />
  <button id="send-btn" onclick="send()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
let history = [];

userInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !sendBtn.disabled) send(); });

function useSuggestion(btn) {
  userInput.value = btn.textContent;
  send();
}

function addMessage(role, text) {
  const welcome = chatContainer.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'You' : 'Agent';
  div.appendChild(label);
  div.appendChild(document.createTextNode(text));
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;

  if (role === 'ai' && /payment|card type|pay with|card details|process.*payment/i.test(text)) {
    showPaymentPicker();
  }
}

function showPaymentPicker() {
  if (document.getElementById('payment-picker')) return;

  const card = document.createElement('div');
  card.className = 'payment-card';
  card.id = 'payment-picker';
  card.innerHTML = `
    <h3>💳 Secure Payment</h3>
    <div class="card-options">
      <div class="card-option" data-card="visa" onclick="selectCard(this)">
        <svg width="40" height="26" viewBox="0 0 50 32"><rect width="50" height="32" rx="4" fill="#1A1F71"/><text x="25" y="20" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="12" font-weight="bold" font-style="italic">VISA</text></svg>
        <span>Visa</span>
      </div>
      <div class="card-option" data-card="mastercard" onclick="selectCard(this)">
        <svg width="40" height="26" viewBox="0 0 50 32"><rect width="50" height="32" rx="4" fill="#252525"/><circle cx="20" cy="16" r="10" fill="#EB001B"/><circle cx="30" cy="16" r="10" fill="#F79E1B"/><circle cx="25" cy="16" r="6.5" fill="#FF5F00"/></svg>
        <span>Mastercard</span>
      </div>
      <div class="card-option" data-card="amex" onclick="selectCard(this)">
        <svg width="40" height="26" viewBox="0 0 50 32"><rect width="50" height="32" rx="4" fill="#2E77BC"/><text x="25" y="20" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="8" font-weight="bold">AMEX</text></svg>
        <span>Amex</span>
      </div>
    </div>
    <div class="payment-field">
      <label>Card Number</label>
      <input id="card-number" type="password" maxlength="16" placeholder="••••••••••••••••" oninput="this.value=this.value.replace(/\\D/g,'').substring(0,16)" autocomplete="cc-number" />
    </div>
    <div class="payment-row">
      <div class="payment-field">
        <label>Expiration Date</label>
        <input id="card-expiry" type="text" maxlength="7" placeholder="MM/YYYY" oninput="formatExpiry(this)" autocomplete="cc-exp" />
      </div>
    </div>
    <button class="pay-btn" onclick="submitPayment()">🔒 Pay Securely</button>
    <div class="secure-note">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/></svg>
      Card number is encrypted before transmission. We never store your full card number.
    </div>
  `;
  chatContainer.appendChild(card);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

let selectedCard = '';
let pendingPaymentMsg = '';

function selectCard(el) {
  document.querySelectorAll('.card-option').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCard = el.dataset.card;
}

function formatExpiry(input) {
  let v = input.value.replace(/\D/g, '').substring(0, 6);
  if (v.length > 2) v = v.substring(0, 2) + '/' + v.substring(2);
  input.value = v;
}

async function submitPayment() {
  const cardNum = document.getElementById('card-number').value.replace(/\D/g, '');
  const expiry = document.getElementById('card-expiry').value.trim();

  if (!selectedCard) { alert('Please select a card type.'); return; }
  if (!/^\d{15,16}$/.test(cardNum)) { alert('Please enter a valid card number (15-16 digits).'); return; }
  if (!/^(0[1-9]|1[0-2])\/\d{4}$/.test(expiry)) { alert('Please enter expiration date as MM/YYYY.'); return; }

  const payBtn = document.querySelector('.pay-btn');
  payBtn.disabled = true;
  payBtn.textContent = 'Encrypting...';

  try {
    const res = await fetch('/encrypt_card', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ card_number: cardNum }),
    });
    const data = await res.json();

    const picker = document.getElementById('payment-picker');
    if (picker) picker.remove();

    // Send masked info to chat — encrypted token is passed along for the agent
    const masked = '**** **** **** ' + data.last_four;
    pendingPaymentMsg = `Pay with ${selectedCard} card ${masked}, expiration ${expiry}, encrypted_card_number: ${data.encrypted_card_number}`;
    userInput.value = pendingPaymentMsg;
    send();
  } catch (err) {
    alert('Failed to encrypt card. Please try again.');
    payBtn.disabled = false;
    payBtn.textContent = '🔒 Pay Securely';
  }
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function send() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = '';

  // Show only masked version to user (hide encrypted token and card number)
  const displayText = text.replace(/encrypted_card_number: \S+/, '').replace(/,\s*$/, '').trim();
  addMessage('user', displayText);

  sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text, history }),
    });
    const data = await res.json();
    hideTyping();

    if (data.result) {
      addMessage('ai', data.result);
      history.push({ type: 'human', content: text });
      history.push({ type: 'ai', content: data.result });
    } else {
      addMessage('ai', 'Sorry, something went wrong. Please try again.');
    }
  } catch (err) {
    hideTyping();
    addMessage('ai', 'Connection error. Is the server running?');
  }

  sendBtn.disabled = false;
  userInput.focus();
}
</script>
</body>
</html>
